<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Triager Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .section-card {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 1px 4px rgba(0,0,0,.08);
        }
        .risk-CRITICAL { border-left: 6px solid #6f42c1; }
        .risk-HIGH     { border-left: 6px solid #dc3545; }
        .risk-MEDIUM   { border-left: 6px solid #ffc107; }
        .risk-LOW      { border-left: 6px solid #198754; }
        .risk-CRITICAL .risk-badge { color: #6f42c1; }
        .risk-HIGH     .risk-badge { color: #dc3545; }
        .risk-MEDIUM   .risk-badge { color: #e6a817; }
        .risk-LOW      .risk-badge { color: #198754; }
        #payload { font-family: monospace; font-size: .8rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container" style="max-width:860px">
            <span class="navbar-brand mb-0 h1">
                🛡️ Automated Log Triager &amp; Diagnostic Agent
            </span>
        </div>
    </nav>

    <div class="container mt-4 mb-5" style="max-width:860px">

        <!-- Submit form -->
        <div class="section-card mb-4">
            <h6 class="fw-bold mb-3">Submit Log for Triage</h6>
            <textarea id="payload" class="form-control mb-3" rows="11"></textarea>
            <div class="d-flex align-items-center gap-3">
                <button id="submit-btn" class="btn btn-dark px-4"
                        onclick="submitLog()">Send Log</button>
                <button class="btn btn-outline-secondary"
                        onclick="pasteLog()">Paste from Clipboard</button>
                <button class="btn btn-outline-secondary"
                        onclick="clearLog()">Clear</button>
                <span id="status-msg" class="text-muted small"></span>
            </div>
        </div>

        <!-- Latest diagnosis -->
        <h6 class="fw-bold mb-3">Latest Diagnosis</h6>
        <div id="report-container">
            <p class="text-muted">No reports yet.</p>
        </div>
    </div>

    <script>
    const SAMPLES = {
        ERR_RPC_NODE_TIMEOUT: {
            service: "ledger-gateway",
            environment: "production",
            error_payload: {
                component: "evm-bridge-client",
                http_status: 504,
                error_code: "ERR_RPC_NODE_TIMEOUT",
                message: "Gateway timeout broadcasting transaction to RPC node.",
                network_details: {
                    target_host: "rpc.internal",
                    latency_ms: 15000,
                    retries_attempted: 3
                },
                raw_trace: "Panic: connection reset by peer at runtime.rs:142"
            }
        },
        ERR_INSUFFICIENT_WALLET_FUNDS: {
            service: "payment-processor",
            environment: "production",
            error_payload: {
                component: "wallet-service",
                http_status: 402,
                error_code: "ERR_INSUFFICIENT_WALLET_FUNDS",
                message: "Transaction rejected: source wallet balance below required amount.",
                wallet_details: {
                    required_amount: "0.95",
                    available_balance: "0.12",
                    currency: "ETH"
                },
                raw_trace: "Error: insufficient funds for transfer at ledger/wallet.go:318"
            }
        },
        ERR_LEDGER_SYNC_DIVERGENCE: {
            service: "chain-validator",
            environment: "production",
            error_payload: {
                component: "sync-service",
                http_status: 500,
                error_code: "ERR_LEDGER_SYNC_DIVERGENCE",
                message: "Local ledger state diverged from canonical chain. Block validation failed.",
                sync_details: {
                    local_block_hash: "0xabc123f...",
                    expected_block_hash: "0xdef456a...",
                    diverged_at_height: 4812903
                },
                raw_trace: "FATAL: block hash mismatch at height 4812903, halting validation"
            }
        },
        ERR_BRIDGE_SERVICE_UNAVAILABLE: {
            service: "bridge-coordinator",
            environment: "production",
            error_payload: {
                component: "health-monitor",
                http_status: 503,
                error_code: "ERR_BRIDGE_SERVICE_UNAVAILABLE",
                message: "Cross-chain bridge is not responding. All transfers are blocked.",
                health_check: {
                    endpoint: "http://bridge.internal/health",
                    last_success_ago_seconds: 312,
                    consecutive_failures: 8
                },
                raw_trace: "dial tcp bridge.internal:8080: connect: connection refused"
            }
        },
        ERR_NONCE_MISMATCH: {
            service: "tx-manager",
            environment: "production",
            error_payload: {
                component: "submission-service",
                http_status: 400,
                error_code: "ERR_NONCE_MISMATCH",
                message: "Transaction rejected: submitted nonce does not match expected nonce for sender.",
                tx_details: {
                    sender: "0x71C7656EC7ab88b098defB751B7401B5f6d8976F",
                    submitted_nonce: 142,
                    expected_nonce: 147
                },
                raw_trace: "Error: nonce too low: have 147, got 142 at core/tx_pool.go:604"
            }
        },
        ERR_GAS_LIMIT_EXCEEDED: {
            service: "contract-executor",
            environment: "staging",
            error_payload: {
                component: "evm-runtime",
                http_status: 200,
                error_code: "ERR_GAS_LIMIT_EXCEEDED",
                message: "Transaction reverted: execution ran out of gas before completing.",
                gas_details: {
                    gas_limit_set: 80000,
                    gas_consumed: 80000,
                    gas_estimated: 112000
                },
                raw_trace: "Error: out of gas at evm/interpreter.go:221"
            }
        },
        ERR_MEMPOOL_CONGESTION: {
            service: "tx-submitter",
            environment: "production",
            error_payload: {
                component: "mempool-monitor",
                http_status: 429,
                error_code: "ERR_MEMPOOL_CONGESTION",
                message: "Node mempool at maximum capacity. New transactions are being rejected.",
                mempool_details: {
                    current_size: 5000,
                    max_size: 5000,
                    pending_tx_count: 4998,
                    min_gas_price_gwei: 120
                },
                raw_trace: "Error: mempool is full at p2p/tx_handler.go:89"
            }
        },
        ERR_RELAYER_STUCK: {
            service: "cross-chain-relayer",
            environment: "production",
            error_payload: {
                component: "event-processor",
                http_status: 500,
                error_code: "ERR_RELAYER_STUCK",
                message: "Message relayer has stopped forwarding cross-chain events.",
                relayer_details: {
                    last_processed_event: "0x9f3a...",
                    queue_backlog: 214,
                    stuck_since_minutes: 18,
                    signing_wallet_balance_eth: "0.003"
                },
                raw_trace: "fatal: relayer goroutine deadlocked at relayer/processor.go:193"
            }
        },
        ERR_BLOCK_FINALITY_TIMEOUT: {
            service: "settlement-service",
            environment: "production",
            error_payload: {
                component: "confirmation-tracker",
                http_status: 408,
                error_code: "ERR_BLOCK_FINALITY_TIMEOUT",
                message: "Transaction did not reach finality within expected confirmation window.",
                finality_details: {
                    tx_hash: "0x4e2b8c...",
                    blocks_waited: 120,
                    required_confirmations: 12,
                    current_confirmations: 0
                },
                raw_trace: "Timeout: tx 0x4e2b8c not confirmed after 120 blocks"
            }
        },
        ERR_CONSENSUS_ROUND_FAILURE: {
            service: "validator-node",
            environment: "production",
            error_payload: {
                component: "consensus-engine",
                http_status: 500,
                error_code: "ERR_CONSENSUS_ROUND_FAILURE",
                message: "Consensus layer failed to reach agreement within round timeout. Block production halted.",
                consensus_details: {
                    round: 8812,
                    timeout_seconds: 10,
                    validators_total: 21,
                    validators_unreachable: 8
                },
                raw_trace: "FATAL: consensus timeout on round 8812 — insufficient quorum"
            }
        }
    };

    function freshMeta() {
        return {
            timestamp: new Date().toISOString(),
            transaction_id: "tx_" + Math.random().toString(36).slice(2, 10)
        };
    }

    document.getElementById("payload").value =
        JSON.stringify(Object.assign(freshMeta(), SAMPLES.ERR_RPC_NODE_TIMEOUT), null, 2);

    let pendingId = null;

    function riskClass(a) {
        if (!a) return "NONE";
        const t = a.toUpperCase();
        if (t.includes("CRITICAL")) return "CRITICAL";
        if (t.includes("HIGH"))     return "HIGH";
        if (t.includes("MEDIUM"))   return "MEDIUM";
        if (t.includes("LOW"))      return "LOW";
        return "NONE";
    }

    function renderReport(r) {
        const rc = riskClass(r.diagnosis?.risk_assessment);
        if (r.status !== "DIAGNOSED") {
            return `
            <div class="card shadow-sm border-danger">
              <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-2">
                  <h5 class="mb-0">Tx ID: ${r.transaction_id}</h5>
                  <span class="badge bg-danger">FAILED</span>
                </div>
                <div class="alert alert-warning mb-0">${r.error}</div>
              </div>
            </div>`;
        }
        const d = r.diagnosis;
        return `
        <div class="card shadow-sm risk-${rc}">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-1">
              <h5 class="mb-0">Tx ID: ${r.transaction_id}</h5>
              <span class="badge bg-success">DIAGNOSED</span>
            </div>
            <p class="text-muted small mb-3">${r.timestamp}</p>
            <div class="mb-3">
              <strong>Risk Assessment:</strong>
              <span class="fw-bold risk-badge ms-2">${d.risk_assessment}</span>
            </div>
            <div class="mb-3">
              <strong>Root Cause:</strong>
              <p class="mt-1 mb-0">${d.root_cause}</p>
            </div>
            <div class="mb-3">
              <strong>Action Plan:</strong>
              <ul class="mt-1 mb-0">
                ${d.action_plan.map(s => `<li>${s}</li>`).join("")}
              </ul>
            </div>
            <div class="alert alert-info py-2 mb-0 mt-3">
              <strong>Advisor Notes:</strong><br>${d.advisor_notes}
            </div>
          </div>
        </div>`;
    }

    function renderProcessing(txId) {
        return `
        <div class="card shadow-sm border-secondary">
          <div class="card-body d-flex align-items-center gap-3 py-4">
            <div class="spinner-border spinner-border-sm text-secondary"
                 role="status"></div>
            <div>
              <strong>${txId}</strong>
              <p class="text-muted small mb-0">
                Running triage pipeline — may take up to 30s.
              </p>
            </div>
          </div>
        </div>`;
    }

    function refreshPayload() {
        const p = JSON.parse(document.getElementById("payload").value);
        p.transaction_id = "tx_" + Math.random().toString(36).slice(2, 10);
        p.timestamp = new Date().toISOString();
        document.getElementById("payload").value = JSON.stringify(p, null, 2);
    }

    async function fetchLatest() {
        const res = await fetch("/api/v1/reports");
        const reports = await res.json();
        const latest = reports[0];
        const container = document.getElementById("report-container");

        if (pendingId) {
            if (latest && latest.transaction_id === pendingId) {
                pendingId = null;
                document.getElementById("status-msg").textContent = "";
                document.getElementById("submit-btn").disabled = false;
                container.innerHTML = renderReport(latest);
                refreshPayload();
            } else {
                container.innerHTML = renderProcessing(pendingId);
            }
        } else {
            container.innerHTML = latest
                ? renderReport(latest)
                : "<p class='text-muted'>No reports yet.</p>";
        }
    }

    function clearLog() {
        document.getElementById("payload").value = "";
        document.getElementById("status-msg").textContent = "";
    }

    async function pasteLog() {
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById("payload").value = text;
            document.getElementById("status-msg").textContent = "";
        } catch {
            document.getElementById("status-msg").textContent =
                "Clipboard access denied. Paste manually with Ctrl+V.";
        }
    }

    async function submitLog() {
        let payload;
        try {
            payload = JSON.parse(document.getElementById("payload").value);
        } catch {
            document.getElementById("status-msg").textContent = "Invalid JSON.";
            return;
        }

        const btn = document.getElementById("submit-btn");
        btn.disabled = true;
        document.getElementById("status-msg").textContent = "Sending…";

        const res = await fetch("/api/v1/logs/triage", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        if (res.ok) {
            pendingId = payload.transaction_id;
            document.getElementById("status-msg").textContent = "";
        } else {
            document.getElementById("status-msg").textContent =
                "Error: " + res.status;
            btn.disabled = false;
        }
    }

    setInterval(fetchLatest, 3000);
    fetchLatest();
    </script>
</body>
</html>
