version: '3.8'

services:
  api:
    build: .
    container_name: log-triager-api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      # Vector DB is Chroma Cloud (managed) - same for local dev and
      # production now, just pointed at different databases. No local
      # ChromaDB container to run or keep in sync anymore. Use a separate
      # database (e.g. "log-triager-dev") for local work so it doesn't
      # share data with the production database.
      - CHROMA_API_KEY=${CHROMA_API_KEY}
      - CHROMA_TENANT=${CHROMA_TENANT}
      - CHROMA_DATABASE=${CHROMA_DATABASE:-log-triager-dev}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_MODEL_NAME=models/gemini-2.5-flash
    volumes:
      - .:/app
    restart: unless-stopped
